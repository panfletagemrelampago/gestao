{% extends "base.html" %}

{% block title %}Editar Membro - Gestão Promocional{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-12 col-lg-8">

<div class="d-flex align-items-center mb-4">

<a href="{{ url_for('equipe.listar') }}"
class="btn btn-light rounded-circle me-3">

<i class="fas fa-arrow-left"></i>

</a>

<h2 class="fw-bold mb-0">
Editar <span class="text-vinho">Membro</span>
</h2>

</div>



<div class="card border-0 shadow-sm rounded-4 overflow-hidden">

<div class="card-body p-4">

<form method="POST">

<div class="row g-3">

<div class="col-12">

<label class="form-label">Nome Completo</label>

<input
type="text"
class="form-control"
name="nome"
value="{{ membro.nome }}"
required>

</div>


<div class="col-12 col-md-6">

<label class="form-label">Cargo</label>

<select class="form-select" name="cargo">

<option value="Promotor"
{% if membro.cargo == 'Promotor' %}selected{% endif %}>
Promotor
</option>

<option value="Líder de Equipe"
{% if membro.cargo == 'Líder de Equipe' %}selected{% endif %}>
Líder de Equipe
</option>

<option value="Supervisor"
{% if membro.cargo == 'Supervisor' %}selected{% endif %}>
Supervisor
</option>

<option value="Motorista"
{% if membro.cargo == 'Motorista' %}selected{% endif %}>
Motorista
</option>

</select>

</div>


<div class="col-12 col-md-6">

<label class="form-label">Telefone</label>

<input
type="text"
class="form-control"
name="telefone"
value="{{ membro.telefone }}"
required>

</div>


<div class="col-12 mt-4">

<div class="d-flex justify-content-end gap-2">

<a href="{{ url_for('equipe.listar') }}"
class="btn btn-light">

Cancelar

</a>

<button type="submit"
class="btn btn-primary">

Salvar Alterações

</button>

</div>

</div>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
