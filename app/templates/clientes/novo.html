{% extends "base.html" %}

{% block title %}Novo Cliente - Gestão Promocional{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('clientes.listar') }}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">Novo <span class="text-vinho">Cliente</span></h2>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="nome_empresa" class="form-label">Nome da Empresa</label>
                            <input type="text" class="form-control" id="nome_empresa" name="nome_empresa" required placeholder="Ex: Supermercados ABC">
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="responsavel" class="form-label">Responsável</label>
                            <input type="text" class="form-control" id="responsavel" name="responsavel" required placeholder="Ex: João Silva">
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="email" class="form-label">E-mail de Contato</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="Ex: contato@abc.com.br">
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="telefone" class="form-label">Telefone</label>
                            <input type="text" class="form-control" id="telefone" name="telefone" required placeholder="Ex: (11) 99999-9999">
                        </div>
                        <div class="col-12 col-md-4">
                            <label for="cidade" class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="cidade" name="cidade" required placeholder="Ex: São Paulo">
                        </div>
                        <div class="col-12 col-md-2">
                            <label for="estado" class="form-label">UF</label>
                            <input type="text" class="form-control" id="estado" name="estado" maxlength="2" required placeholder="Ex: SP">
                        </div>

                        <div class="col-12 mt-4">
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="{{ url_for('clientes.listar') }}" class="btn btn-light px-4">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-5">Cadastrar Cliente</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
