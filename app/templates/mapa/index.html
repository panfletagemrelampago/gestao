{% extends "base.html" %}
{% block title %}Mapa de Auditoria — Gestão Promocional{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
#map{
height:70vh;
width:100%;
border-radius:12px;
box-shadow:var(--shadow-md);
z-index:1;
}

.leaflet-popup-content img{
max-width:220px;
border-radius:6px;
margin-top:6px;
display:block;
}

#painel-controle{
position:absolute;
top:80px;
right:10px;
z-index:1000;
width:270px;
background:white;
border-radius:12px;
box-shadow:var(--shadow-md);
padding:14px;
font-size:13px;
max-height:calc(70vh - 20px);
overflow-y:auto;
}

.layer-toggle{
cursor:pointer;
user-select:none;
}

.layer-toggle input{
margin-right:6px;
}

.cor-legenda{
display:inline-block;
width:14px;
height:14px;
border-radius:50%;
margin-right:5px;
vertical-align:middle;
}
</style>
{% endblock %}

{% block content %}

<div class="position-relative">
<div id="map"></div>

<div id="painel-controle">

<div class="fw-bold mb-2" style="color:#8E0000;">
<i class="fas fa-layer-group me-1"></i>
Camadas
</div>

<label class="layer-toggle d-block mb-1">
<input type="checkbox" id="toggle-rastros" checked>
<span class="cor-legenda" style="background:#8E0000;"></span>
Usuários Online (GPS)
</label>

<label class="layer-toggle d-block mb-1">
<input type="checkbox" id="toggle-fotos" checked>
<span class="cor-legenda" style="background:#FF9E0C;"></span>
Fotos de Campo
</label>

<label class="layer-toggle d-block mb-1">
<input type="checkbox" id="toggle-areas" checked>
<span class="cor-legenda" style="background:#0d6efd;border-radius:2px;"></span>
Áreas de Atuação
</label>

<hr class="my-2">

<div id="stats-rastros" class="small">
Usuários Ativos: <strong>0</strong>
</div>

<div id="stats-ultima-atualizacao" class="small text-muted mt-1">
—
</div>

</div>
</div>

{% endblock %}

{% block scripts %}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>

const map = L.map("map").setView([-15.5668,-56.0568],13)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map)

// FeatureGroup para desenhos editáveis
const drawnItems = new L.FeatureGroup().addTo(map);

const layers={
rastros:L.layerGroup().addTo(map),
fotos:L.layerGroup().addTo(map),
areas:drawnItems, // Usar drawnItems para áreas para permitir edição
desenho:drawnItems,
historico:L.layerGroup().addTo(map)
}

function carregarAreasSalvas(){
    fetch("/api/mapa/areas")
    .then(r=>r.json())
    .then(data=>{
        layers.areas.clearLayers()
        data.forEach(area=>{
            const geojsonLayer=L.geoJSON(area.geojson,{
                style:{
                    color:"#0d6efd",
                    weight:3,
                    opacity:0.8,
                    fillOpacity:0.3
                }
            })

            // Extrair a camada real do GeoJSON para adicionar ao FeatureGroup
            geojsonLayer.eachLayer(function(layer) {
                layer.options.areaId = area.id; // Armazenar ID para referência
                layer.bindPopup(`
                    <b>Área: ${area.nome}</b><br>
                    Criada em: ${new Date(area.criado_em).toLocaleString()}
                `);
                layers.areas.addLayer(layer);
            });
        })
    })
}

function carregarDadosGPS(){
    fetch("/api/gps/latest")
    .then(r=>r.json())
    .then(data=>{
        layers.rastros.clearLayers()
        let online=0

        data.forEach(pos=>{
            online++
            const marker=L.circleMarker(
                [pos.latitude,pos.longitude],
                {
                    radius:8,
                    fillColor:"#8E0000",
                    color:"#fff",
                    weight:2,
                    fillOpacity:1
                }
            )
            marker.addTo(layers.rastros)

            marker.bindPopup(`
                <div style="line-height:1.2;">
                    <strong>${pos.user_nome}</strong><br>
                    <b>Precisão:</b> ${pos.accuracy ? pos.accuracy.toFixed(1) + 'm' : '--'}<br>
                    <small>Atualizado: ${new Date(pos.created_at).toLocaleString("pt-BR")}</small><br>
                    <button class="btn btn-sm btn-link p-0 mt-1" onclick="verHistorico(${pos.user_id})">Ver Rastro</button>
                </div>
            `)
        })

        document.getElementById("stats-rastros").innerHTML =
        "Usuários Ativos: <strong>"+online+"</strong>"

        document.getElementById("stats-ultima-atualizacao").textContent =
        "Sincronizado: "+new Date().toLocaleTimeString("pt-BR")
    })
}

function verHistorico(userId) {
    fetch(`/api/gps/historico/${userId}`)
    .then(r=>r.json())
    .then(data=>{
        layers.historico.clearLayers()
        if (data.pontos && data.pontos.length > 1) {
            const latlngs = data.pontos.map(p => [p.lat, p.lon])
            const polyline = L.polyline(latlngs, {color: '#8E0000', weight: 3, opacity: 0.6}).addTo(layers.historico)
            map.fitBounds(polyline.getBounds())
        }
    })
}

document.getElementById("toggle-rastros")
.addEventListener("change",function(){
    this.checked
    ? map.addLayer(layers.rastros)
    : map.removeLayer(layers.rastros)
})

document.getElementById("toggle-fotos")
.addEventListener("change",function(){
    this.checked
    ? map.addLayer(layers.fotos)
    : map.removeLayer(layers.fotos)
})

document.getElementById("toggle-areas")
.addEventListener("change",function(){
    this.checked
    ? map.addLayer(layers.areas)
    : map.removeLayer(layers.areas)
})

const drawControl=new L.Control.Draw({
    draw:{
        polygon:{
            allowIntersection:false,
            showArea:true,
            shapeOptions:{color:"#0d6efd"}
        },
        rectangle:true,
        circle:false,
        marker:false,
        polyline:false,
        circlemarker:false
    },
    edit:{
        featureGroup:layers.desenho
    }
})

map.addControl(drawControl)

// Evento: Criação de nova área
map.on(L.Draw.Event.CREATED, function(e){
    const layer=e.layer
    const geojson=layer.toGeoJSON()

    fetch("/api/mapa/areas", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({geojson: geojson})
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "sucesso") {
            layer.options.areaId = data.id;
            layers.desenho.addLayer(layer);
            console.log("Área salva com ID:", data.id);
        }
    })
})

// Evento: Edição de áreas existentes
map.on(L.Draw.Event.EDITED, function(e) {
    const layersEdited = e.layers;
    layersEdited.eachLayer(function(layer) {
        const areaId = layer.options.areaId;
        if (areaId) {
            const geojson = layer.toGeoJSON();
            fetch(`/api/mapa/areas/${areaId}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({geojson: geojson})
            })
            .then(r => r.json())
            .then(data => console.log("Área atualizada:", areaId))
            .catch(err => console.error("Erro ao atualizar área:", err));
        }
    });
});

// Evento: Exclusão de áreas
map.on(L.Draw.Event.DELETED, function(e) {
    const layersDeleted = e.layers;
    layersDeleted.eachLayer(function(layer) {
        const areaId = layer.options.areaId;
        if (areaId) {
            fetch(`/api/mapa/areas/${areaId}`, {
                method: "DELETE"
            })
            .then(r => r.json())
            .then(data => console.log("Área removida:", areaId))
            .catch(err => console.error("Erro ao remover área:", err));
        }
    });
});

carregarAreasSalvas()
carregarDadosGPS()

setInterval(carregarDadosGPS, 10000)

</script>

{% endblock %}
