{% extends "base.html" %}

{% block title %}Nova Candidatura - Gestão Promocional{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-10">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('vagas.listar') }}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">Nova <span class="text-vinho">Candidatura</span></h2>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    
                    <h5 class="text-vinho fw-bold border-bottom pb-2 mb-3">Dados Pessoais</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-6">
                            <label for="nome_completo" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome_completo" name="nome_completo" required>
                        </div>
                        <div class="col-12 col-md-3">
                            <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                            <input type="date" class="form-control" id="data_nascimento" name="data_nascimento" required>
                        </div>
                        <div class="col-12 col-md-3">
                            <label for="cpf" class="form-label">CPF</label>
                            <input type="text" class="form-control" id="cpf" name="cpf" required placeholder="000.000.000-00">
                        </div>
                    </div>

                    <h5 class="text-vinho fw-bold border-bottom pb-2 mb-3">Contato e Endereço</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-4">
                            <label for="telefone" class="form-label">Telefone / WhatsApp</label>
                            <input type="text" class="form-control" id="telefone" name="telefone" required>
                        </div>
                        <div class="col-12 col-md-4">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="col-12 col-md-4">
                            <label for="cidade" class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="cidade" name="cidade" required>
                        </div>
                    </div>

                    <h5 class="text-vinho fw-bold border-bottom pb-2 mb-3">Dados Profissionais</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-4">
                            <label for="area_atuacao" class="form-label">Área de Atuação</label>
                            <input type="text" class="form-control" id="area_atuacao" name="area_atuacao" required placeholder="Ex: Promotor de Vendas">
                        </div>
                        <div class="col-12 col-md-8">
                            <label for="experiencia" class="form-label">Experiência Profissional</label>
                            <textarea class="form-control" id="experiencia" name="experiencia" rows="3" required placeholder="Resumo de experiências anteriores..."></textarea>
                        </div>
                    </div>

                    <h5 class="text-vinho fw-bold border-bottom pb-2 mb-3">Documentação (Upload)</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-6">
                            <label for="rg" class="form-label">Foto do RG</label>
                            <input type="file" class="form-control" id="rg" name="rg" accept="image/*,.pdf">
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="cpf_doc" class="form-label">Foto do CPF</label>
                            <input type="file" class="form-control" id="cpf_doc" name="cpf_doc" accept="image/*,.pdf">
                        </div>
                    </div>

                    <div class="col-12 mt-4">
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{{ url_for('vagas.listar') }}" class="btn btn-light px-4">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-5">Cadastrar Candidatura</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
