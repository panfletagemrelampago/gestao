{% extends "base.html" %}

{% block title %}Novo Veículo - Gestão Promocional{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('veiculos.listar') }}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">Novo <span class="text-vinho">Veículo</span></h2>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label for="marca" class="form-label">Marca</label>
                            <input type="text" class="form-control" id="marca" name="marca" required placeholder="Ex: Fiat">
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="modelo" class="form-label">Modelo</label>
                            <input type="text" class="form-control" id="modelo" name="modelo" required placeholder="Ex: Fiorino">
                        </div>

                        <div class="col-12 col-md-4">
                            <label for="placa" class="form-label">Placa</label>
                            <input type="text" class="form-control" id="placa" name="placa" required placeholder="Ex: ABC-1234">
                        </div>
                        <div class="col-12 col-md-4">
                            <label for="cor" class="form-label">Cor</label>
                            <input type="text" class="form-control" id="cor" name="cor" required placeholder="Ex: Branco">
                        </div>
                        <div class="col-12 col-md-4">
                            <label for="motorista_id" class="form-label">Motorista Responsável</label>
                            <select class="form-select" id="motorista_id" name="motorista_id">
                                <option value="">Nenhum</option>
                                {% for membro in equipes %}
                                <option value="{{ membro.id }}">{{ membro.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-12 mt-4">
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="{{ url_for('veiculos.listar') }}" class="btn btn-light px-4">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-5">Cadastrar Veículo</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
