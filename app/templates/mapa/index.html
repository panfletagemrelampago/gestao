{% extends "base.html" %}
{% block title %}Mapa de Auditoria — Gestão Promocional{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
#map{
    height:75vh;
    width:100%;
    border-radius:15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    z-index:1;
}

.leaflet-popup-content img{
    max-width:220px;
    border-radius:8px;
    margin-top:8px;
    display:block;
}

/* ── PAINEL RETRÁTIL ── */
#painel-controle{
    position:fixed;
    top:15px;
    right:15px;
    z-index:1000;
    width:250px;
    max-height:80vh;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    padding: 0;
    font-size: 13px;
    transition: all 0.3s ease;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

#painel-controle.retraido {
    width: 50px;
    height: 50px;
    padding: 0;
    border-radius: 50%;
}

#painel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    background: linear-gradient(135deg, #8E0000 0%, #a00000 100%);
    color: white;
    font-weight: 600;
    flex-shrink: 0;
    cursor: pointer;
    border-radius: 15px 15px 0 0;
    user-select: none;
}

#painel-controle.retraido #painel-header {
    border-radius: 50%;
    padding: 0;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
}

#btn-toggle-painel {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    display: none;
}

#painel-controle.retraido #btn-toggle-painel {
    display: block;
}

#painel-titulo {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
}

#painel-controle.retraido #painel-titulo {
    display: none;
}

#painel-conteudo {
    padding: 15px;
    overflow-y: auto;
    flex: 1;
}

#painel-controle.retraido #painel-conteudo {
    display: none;
}

.layer-toggle{
    cursor:pointer;
    user-select:none;
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    padding: 8px;
    border-radius: 8px;
    transition: background 0.2s;
}

.layer-toggle:hover {
    background: rgba(0,0,0,0.03);
}

.layer-toggle input{
    margin-right:10px;
    cursor: pointer;
}

.cor-legenda{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:3px;
    margin-right:8px;
}

.divisor-painel {
    height: 1px;
    background: rgba(0,0,0,0.1);
    margin: 8px 0;
}

.stats-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
}

/* Toast de notificação */
#toast-mapa {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    min-width: 280px;
    display: none;
}

/* Responsivo: painel sempre retraído em celular */
@media (max-width: 768px) {
    #painel-controle {
        width: 50px;
        height: 50px;
        padding: 0;
        border-radius: 50%;
    }

    #painel-controle.retraido {
        width: 50px;
        height: 50px;
    }

    #painel-header {
        border-radius: 50%;
        padding: 0;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #btn-toggle-painel {
        display: block !important;
    }

    #painel-titulo {
        display: none !important;
    }

    #painel-conteudo {
        display: none !important;
    }

    #painel-controle.expandido #painel-conteudo {
        display: block !important;
    }

    #painel-controle.expandido {
        width: 250px;
        height: auto;
        max-height: 80vh;
        border-radius: 15px;
    }

    #painel-controle.expandido #painel-header {
        border-radius: 15px 15px 0 0;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="position-relative">
    <div id="map"></div>

    <!-- PAINEL RETRÁTIL -->
    <div id="painel-controle">
        <div id="painel-header">
            <div id="painel-titulo">
                <i class="fas fa-layer-group"></i>
                <span>Camadas</span>
            </div>
            <button id="btn-toggle-painel" type="button">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div id="painel-conteudo">
            <label class="layer-toggle">
                <input type="checkbox" id="toggle-fotos" checked>
                <span class="cor-legenda" style="background:#FF9E0C; border-radius: 50%;"></span>
                <span>Fotos de Campo</span>
            </label>

            <label class="layer-toggle">
                <input type="checkbox" id="toggle-areas" checked>
                <span class="cor-legenda" style="background:#0d6efd;"></span>
                <span>Áreas de Atuação</span>
            </label>

            <div class="divisor-painel"></div>

            <div class="stats-item">
                <span>Fotos no mapa:</span>
                <strong id="stats-fotos-count">0</strong>
            </div>
            <div class="stats-item">
                <span>Áreas salvas:</span>
                <strong id="count-areas">0</strong>
            </div>
        </div>
    </div>
</div>

<!-- Toast de notificação -->
<div id="toast-mapa" class="alert shadow-lg border-0 rounded-3 text-center fw-semibold"></div>

{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
// =============================
// PAINEL RETRÁTIL
// =============================
const painelControle = document.getElementById('painel-controle');
const btnTogglePainel = document.getElementById('btn-toggle-painel');
const painelHeader = document.getElementById('painel-header');

// Função para alternar o painel
function togglePainel(e) {
    if (e) e.stopPropagation();
    
    if (window.innerWidth <= 768) {
        // No mobile, usamos a classe 'expandido' para controlar a visibilidade total
        painelControle.classList.toggle('expandido');
    } else {
        // No desktop, usamos a classe 'retraido' para recolher
        painelControle.classList.toggle('retraido');
    }
}

btnTogglePainel.addEventListener('click', togglePainel);
painelHeader.addEventListener('click', togglePainel);

// Fechar painel ao clicar fora (em telas pequenas)
document.addEventListener('click', function(e) {
    if (window.innerWidth <= 768) {
        if (!painelControle.contains(e.target) && painelControle.classList.contains('expandido')) {
            painelControle.classList.remove('expandido');
        }
    }
});

// =============================
// CONFIGURAÇÃO GLOBAL DO MAPA
// =============================
const map = L.map("map").setView([-15.5668, -56.0568], 13);

const layers = {
    base: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map),
    fotos: L.layerGroup().addTo(map),
    areas: L.featureGroup().addTo(map)
};

// Mapa de layers para controle de exclusão (area_id -> layer)
const areaLayerMap = {};

// 🔒 Previne XSS em conteúdo dinâmico
function escapeHTML(str) {
    return str?.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m])) || '';
}

// =============================
// TOAST DE NOTIFICAÇÃO
// =============================
function mostrarToast(mensagem, tipo = 'success') {
    const toast = document.getElementById('toast-mapa');
    toast.className = `alert alert-${tipo} shadow-lg border-0 rounded-3 text-center fw-semibold`;
    toast.textContent = mensagem;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

// =============================
// CARREGAR FOTOS DE CAMPO
// =============================
async function carregarFotos() {
    try {
        const response = await fetch('/api/mapa/fotos');
        const fotos = await response.json();
        layers.fotos.clearLayers();

        const coordenadasValidas = [];

        fotos.forEach(foto => {
            if (!foto.lat || !foto.lng) return;
            coordenadasValidas.push([foto.lat, foto.lng]);

            const marker = L.marker([foto.lat, foto.lng]).addTo(layers.fotos);
            
            const dataFormatada = foto.data ? new Date(foto.data).toLocaleString('pt-BR') : 'N/A';

            const popup = `
                <div style="width:200px">
                    <img src="${foto.img}" style="width:100%; border-radius:8px;" />
                    <p class="mt-2 mb-1"><strong>${escapeHTML(foto.descricao) || 'Sem descrição'}</strong></p>
                    <p class="mb-1 small text-muted"><i class="far fa-calendar-alt me-1"></i> ${dataFormatada}</p>
                    <p class="mb-0 small text-primary fw-bold"><i class="fas fa-clock me-1"></i> Turno: ${foto.turno_id}</p>
                </div>
            `;
            marker.bindPopup(popup);
        });

        document.getElementById("stats-fotos-count").innerText = fotos.length;

        if (coordenadasValidas.length > 0) {
            map.fitBounds(L.latLngBounds(coordenadasValidas), { padding: [50, 50], maxZoom: 16 });
        }
    } catch (err) {
        console.error("Erro ao carregar fotos:", err);
    }
}

// =============================
// CARREGAR ÁREAS DE ATUAÇÃO (com persistência)
// =============================
async function carregarAreas() {
    try {
        const response = await fetch('/api/mapa/areas');
        const areas = await response.json();
        layers.areas.clearLayers();

        // Limpar mapa de layers
        Object.keys(areaLayerMap).forEach(k => delete areaLayerMap[k]);

        let totalAreas = 0;

        areas.forEach(area => {
            if (!area.geojson) return;
            totalAreas++;

            const geoLayer = L.geoJSON(area.geojson, {
                style: {
                    color: area.cor || "#0d6efd",
                    weight: 3,
                    opacity: 0.8,
                    fillOpacity: 0.15
                }
            }).addTo(layers.areas);

            // Guardar referência para exclusão futura
            if (area.id) {
                areaLayerMap[area.id] = geoLayer;
            }

            const nomeArea = escapeHTML(area.nome) || 'Área sem nome';
            const descArea = escapeHTML(area.descricao) || 'Sem descrição';

            {% if current_user.tipo_usuario in ['admin', 'equipe'] %}
            geoLayer.bindPopup(`
                <div style="min-width:180px">
                    <h6 class="mb-1 fw-bold text-primary">${nomeArea}</h6>
                    <p class="mb-2 small">${descArea}</p>
                    <button onclick="excluirArea(${area.id})" class="btn btn-sm btn-danger w-100 rounded-pill">
                        <i class="fas fa-trash me-1"></i> Excluir Área
                    </button>
                </div>
            `);
            {% else %}
            geoLayer.bindPopup(`
                <div style="min-width:150px">
                    <h6 class="mb-1 fw-bold text-primary">${nomeArea}</h6>
                    <p class="mb-0 small">${descArea}</p>
                </div>
            `);
            {% endif %}
        });

        // Atualizar contador
        document.getElementById('count-areas').textContent = totalAreas;

    } catch (err) {
        console.error("Erro ao carregar áreas:", err);
    }
}

// =============================
// SALVAR ÁREA NO BANCO
// =============================
async function salvarArea(layer) {
    const geojson = layer.toGeoJSON();
    const nome = prompt('Nome para esta área (opcional):', 'Área ' + new Date().toLocaleDateString('pt-BR'));
    
    const nomeArea = (nome !== null && nome.trim() !== '') ? nome.trim() : 'Área ' + new Date().toLocaleDateString('pt-BR');

    try {
        mostrarToast('Salvando área...', 'info');

        const response = await fetch('/api/mapa/areas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nome: nomeArea,
                geojson: geojson
            })
        });

        const data = await response.json();

        if (response.ok && data.status === 'sucesso') {
            mostrarToast('✅ Área "' + nomeArea + '" salva com sucesso!', 'success');
            await carregarAreas();
        } else {
            mostrarToast('❌ Erro ao salvar área: ' + (data.erro || 'Tente novamente.'), 'danger');
            layers.areas.removeLayer(layer);
        }
    } catch (err) {
        console.error("Erro ao salvar área:", err);
        mostrarToast('❌ Erro de comunicação ao salvar área.', 'danger');
        layers.areas.removeLayer(layer);
    }
}

// =============================
// EXCLUIR ÁREA DO BANCO
// =============================
async function excluirArea(areaId) {
    if (!confirm('Deseja excluir esta área permanentemente?')) return;

    try {
        const response = await fetch('/api/mapa/areas/' + areaId, {
            method: 'DELETE'
        });

        const data = await response.json();

        if (response.ok && data.status === 'sucesso') {
            mostrarToast('✅ Área excluída com sucesso!', 'success');
            await carregarAreas();
        } else {
            mostrarToast('❌ Erro ao excluir área: ' + (data.erro || 'Tente novamente.'), 'danger');
        }
    } catch (err) {
        console.error("Erro ao excluir área:", err);
        mostrarToast('❌ Erro de comunicação ao excluir área.', 'danger');
    }
}

// =============================
// CONTROLES DE DESENHO (LEAFLET.DRAW)
// =============================
function inicializarDrawControl() {
    {% if current_user.tipo_usuario in ['admin', 'equipe'] %}
    const drawControl = new L.Control.Draw({
        draw: {
            polygon: { allowIntersection: false, shapeOptions: { color: "#0d6efd" } },
            rectangle: { shapeOptions: { color: "#0d6efd" } },
            circle: false, marker: false, polyline: false, circlemarker: false
        },
        edit: { featureGroup: layers.areas }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function(event) {
        const layer = event.layer;
        layers.areas.addLayer(layer);
        salvarArea(layer);
    });

    map.on(L.Draw.Event.EDITED, function(event) {
        event.layers.eachLayer(function(layer) {
            const areaId = Object.keys(areaLayerMap).find(id => {
                const existingLayer = areaLayerMap[id];
                return existingLayer && existingLayer.hasLayer && existingLayer.hasLayer(layer);
            });

            if (areaId) {
                fetch('/api/mapa/areas/' + areaId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ geojson: layer.toGeoJSON() })
                }).then(() => {
                    mostrarToast('✅ Área atualizada!', 'success');
                }).catch(err => {
                    console.error('Erro ao atualizar área:', err);
                    mostrarToast('❌ Erro ao atualizar área.', 'danger');
                });
            }
        });
    });

    map.on(L.Draw.Event.DELETED, function(event) {
        event.layers.eachLayer(function(layer) {
            const areaId = Object.keys(areaLayerMap).find(id => {
                const existingLayer = areaLayerMap[id];
                return existingLayer && existingLayer.hasLayer && existingLayer.hasLayer(layer);
            });

            if (areaId) {
                fetch('/api/mapa/areas/' + areaId, {
                    method: 'DELETE'
                }).then(() => {
                    mostrarToast('✅ Área excluída!', 'success');
                    delete areaLayerMap[areaId];
                }).catch(err => {
                    console.error('Erro ao excluir área:', err);
                });
            }
        });
    });
    {% endif %}
}

// =============================
// INICIALIZAÇÃO E TOGGLES
// =============================
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("toggle-fotos").addEventListener("change", (e) => {
        e.target.checked ? map.addLayer(layers.fotos) : map.removeLayer(layers.fotos);
    });

    document.getElementById("toggle-areas").addEventListener("change", (e) => {
        e.target.checked ? map.addLayer(layers.areas) : map.removeLayer(layers.areas);
    });

    inicializarDrawControl();
    carregarFotos();
    carregarAreas();
});

window.recarregarMapa = () => { carregarFotos(); carregarAreas(); };
</script>
{% endblock %}
