{% extends "base.html" %}
{% block title %}Mapa de Auditoria — Gestão Promocional{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
#map{
    height:75vh;
    width:100%;
    border-radius:15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    z-index:1;
}

.leaflet-popup-content img{
    max-width:220px;
    border-radius:8px;
    margin-top:8px;
    display:block;
}

/* PAINEL DE FILTROS REPOSICIONADO E DISCRETO */
#painel-controle{
    position:absolute;
    top:15px;
    right:15px;
    z-index:1000;
    width:210px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    border: 1px solid rgba(0,0,0,0.05);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    padding: 15px;
    font-size: 13px;
}

.layer-toggle{
    cursor:pointer;
    user-select:none;
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    padding: 5px;
    border-radius: 8px;
    transition: background 0.2s;
}

.layer-toggle:hover { background: rgba(0,0,0,0.03); }
.layer-toggle input{ margin-right:10px; cursor: pointer; }

.cor-legenda{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:3px;
    margin-right:8px;
}
</style>
{% endblock %}

{% block content %}
<div class="position-relative">
    <div id="map"></div>

    <div id="painel-controle">
        <div class="fw-bold mb-3 d-flex align-items-center" style="color:#8E0000;">
            <i class="fas fa-layer-group me-2"></i>
            Camadas do Mapa
        </div>

        <label class="layer-toggle">
            <input type="checkbox" id="toggle-fotos" checked>
            <span class="cor-legenda" style="background:#FF9E0C; border-radius: 50%;"></span>
            Fotos de Campo
        </label>

        <label class="layer-toggle">
            <input type="checkbox" id="toggle-areas" checked>
            <span class="cor-legenda" style="background:#0d6efd;"></span>
            Áreas de Atuação
        </label>

        <hr class="my-3 opacity-10">

        <div id="stats-fotos" class="small text-muted d-flex justify-content-between align-items-center">
            <span>Fotos no mapa:</span>
            <strong class="text-dark">0</strong>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
// =============================
// CONFIGURAÇÃO GLOBAL DO MAPA
// =============================
const map = L.map("map").setView([-15.5668, -56.0568], 13);

const layers = {
    base: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map),
    fotos: L.layerGroup().addTo(map),
    areas: L.featureGroup().addTo(map)
};

function escapeHTML(str) {
    return str?.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m])) || '';
}

// =============================
// CARREGAR FOTOS DE CAMPO
// =============================
async function carregarFotos() {
    try {
        const response = await fetch('/api/mapa/fotos');
        const fotos = await response.json();
        layers.fotos.clearLayers();
        const coordenadasValidas = [];

        fotos.forEach(foto => {
            if (!foto.lat || !foto.lng) return;
            coordenadasValidas.push([foto.lat, foto.lng]);

            const marker = L.marker([foto.lat, foto.lng]).addTo(layers.fotos);
            const popup = `
                <div style="width:200px">
                    <img src="${foto.img}" style="width:100%; border-radius:8px;" />
                    <p class="mt-2 mb-1"><strong>${escapeHTML(foto.descricao) || 'Sem descrição'}</strong></p>
                    <p class="mb-0 small text-primary fw-bold"><i class="fas fa-clock me-1"></i> Turno: ${foto.turno_id}</p>
                </div>`;
            marker.bindPopup(popup);
        });

        document.getElementById("stats-fotos").querySelector('strong').innerText = fotos.length;
        if (coordenadasValidas.length > 0) map.fitBounds(L.latLngBounds(coordenadasValidas), { padding: [50, 50], maxZoom: 16 });
    } catch (err) { console.error("Erro ao carregar fotos:", err); }
}

// =============================
// CARREGAR ÁREAS DE ATUAÇÃO
// =============================
async function carregarAreas() {
    try {
        const response = await fetch('/api/mapa/areas');
        const areas = await response.json();
        layers.areas.clearLayers();

        areas.forEach(area => {
            if (!area.geojson) return;
            const geoLayer = L.geoJSON(area.geojson, {
                style: { color: area.cor || "#0d6efd", weight: 3, opacity: 0.8, fillOpacity: 0.15 }
            }).addTo(layers.areas);

            geoLayer.bindPopup(`<strong>${escapeHTML(area.nome)}</strong><br><small>${escapeHTML(area.descricao) || ''}</small>`);
        });
    } catch (err) { console.error("Erro ao carregar áreas:", err); }
}

// =============================
// CONTROLES DE DESENHO E SALVAMENTO
// =============================
function inicializarDrawControl() {
    const drawControl = new L.Control.Draw({
        draw: {
            polygon: { allowIntersection: false, shapeOptions: { color: "#0d6efd" } },
            rectangle: { shapeOptions: { color: "#0d6efd" } },
            circle: false, marker: false, polyline: false, circlemarker: false
        },
        edit: { featureGroup: layers.areas }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function(event) {
        const layer = event.layer;
        layers.areas.addLayer(layer);
        
        // 🔥 SALVAR AUTOMATICAMENTE NO BANCO DE DADOS
        const geojson = layer.toGeoJSON();
        const urlParams = new URLSearchParams(window.location.search);
        const acao_id = urlParams.get('acao_id') || 1; // Pega o ID da ação da URL
        
        fetch('/api/mapa/areas/salvar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                acao_id: acao_id,
                geojson: geojson,
                nome: `Área ${new Date().toLocaleTimeString('pt-BR')}`,
                descricao: 'Área delimitada via mapa',
                cor: '#0d6efd'
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.sucesso) console.log('✅ Área salva permanentemente!');
            else alert('Erro ao salvar área: ' + data.erro);
        })
        .catch(err => console.error('Erro na requisição:', err));
    });
}

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("toggle-fotos").addEventListener("change", (e) => {
        e.target.checked ? map.addLayer(layers.fotos) : map.removeLayer(layers.fotos);
    });
    document.getElementById("toggle-areas").addEventListener("change", (e) => {
        e.target.checked ? map.addLayer(layers.areas) : map.removeLayer(layers.areas);
    });

    inicializarDrawControl();
    carregarFotos();
    carregarAreas();
});
</script>
{% endblock %}
