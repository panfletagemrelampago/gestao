{% extends "base.html" %}

{% block title %}Novo Membro da Equipe - Gestão Promocional{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('equipe.listar') }}" class="btn btn-light rounded-circle me-3"><i class="fas fa-arrow-left"></i></a>
            <h2 class="fw-bold mb-0">Novo <span class="text-vinho">Membro</span></h2>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" name="nome" required placeholder="Ex: Ricardo Mendes">
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="cargo" class="form-label">Cargo</label>
                            <select class="form-select" id="cargo" name="cargo" required>
                                <option value="Promotor">Promotor</option>
                                <option value="Líder de Equipe">Líder de Equipe</option>
                                <option value="Supervisor">Supervisor</option>
                                <option value="Motorista">Motorista</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="telefone" class="form-label">Telefone / WhatsApp</label>
                            <input type="text" class="form-control" id="telefone" name="telefone" required placeholder="Ex: (11) 99999-9999">
                        </div>

                        <div class="col-12 mt-4">
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="{{ url_for('equipe.listar') }}" class="btn btn-light px-4">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-5">Cadastrar Membro</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
