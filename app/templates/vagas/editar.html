{% extends "base.html" %}

{% block title %}Editar Candidatura{% endblock %}

{% block content %}

<div class="row justify-content-center">
<div class="col-lg-8">

<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('vagas.listar') }}" class="btn btn-light me-3">
        <i class="fas fa-arrow-left"></i>
    </a>

    <h2 class="fw-bold">
        Editar <span class="text-vinho">Candidatura</span>
    </h2>
</div>

<div class="card shadow-sm border-0 rounded-4">
<div class="card-body p-4">

<form method="POST">

<div class="mb-3">
<label class="form-label">Nome Completo</label>
<input type="text"
       name="nome_completo"
       class="form-control"
       value="{{ vaga.dados_pessoais.nome_completo }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">CPF</label>
<input type="text"
       name="cpf"
       class="form-control"
       value="{{ vaga.dados_pessoais.cpf }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Telefone</label>
<input type="text"
       name="telefone"
       class="form-control"
       value="{{ vaga.dados_contato.telefone }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email"
       name="email"
       class="form-control"
       value="{{ vaga.dados_contato.email }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Cidade</label>
<input type="text"
       name="cidade"
       class="form-control"
       value="{{ vaga.dados_contato.cidade }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Área de atuação</label>
<input type="text"
       name="area_atuacao"
       class="form-control"
       value="{{ vaga.dados_profissionais.area_atuacao }}"
       required>
</div>

<div class="mb-3">
<label class="form-label">Experiência</label>
<textarea name="experiencia"
          class="form-control"
          rows="3"
          required>{{ vaga.dados_profissionais.experiencia }}</textarea>
</div>

<div class="text-end">
<button type="submit" class="btn btn-primary">
Salvar Alterações
</button>
</div>

</form>

</div>
</div>

</div>
</div>

{% endblock %}
