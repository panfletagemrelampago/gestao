{% extends "base.html" %}
{% block title %}Mapa de Auditoria — Gestão Promocional{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
#map{
    height:70vh;
    width:100%;
    border-radius:12px;
    box-shadow:var(--shadow-md);
    z-index:1;
}

.leaflet-popup-content img{
    max-width:220px;
    border-radius:6px;
    margin-top:6px;
    display:block;
}

#painel-controle{
    position:absolute;
    top:80px;
    right:10px;
    z-index:1000;
    width:270px;
    background:white;
    border-radius:12px;
    box-shadow:var(--shadow-md);
    padding:14px;
    font-size:13px;
    max-height:calc(70vh - 20px);
    overflow-y:auto;
}

.layer-toggle{
    cursor:pointer;
    user-select:none;
}

.layer-toggle input{
    margin-right:6px;
}

.cor-legenda{
    display:inline-block;
    width:14px;
    height:14px;
    border-radius:50%;
    margin-right:5px;
    vertical-align:middle;
}
</style>
{% endblock %}

{% block content %}
<div class="position-relative">
    <div id="map"></div>

    <div id="painel-controle">
        <div class="fw-bold mb-2" style="color:#8E0000;">
            <i class="fas fa-layer-group me-1"></i>
            Camadas
        </div>

        <label class="layer-toggle d-block mb-1">
            <input type="checkbox" id="toggle-fotos" checked>
            <span class="cor-legenda" style="background:#FF9E0C;"></span>
            Fotos de Campo
        </label>

        <label class="layer-toggle d-block mb-1">
            <input type="checkbox" id="toggle-areas" checked>
            <span class="cor-legenda" style="background:#0d6efd;border-radius:2px;"></span>
            Áreas de Atuação
        </label>

        <hr class="my-2">

        <div id="stats-fotos" class="small">
            Fotos no mapa: <strong>0</strong>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>
// =============================
// CONFIGURAÇÃO GLOBAL
// =============================
const map = L.map("map"); // Sem setView fixo - será definido dinamicamente

const layers = {
    base: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map),
    fotos: L.layerGroup().addTo(map),
    areas: new L.FeatureGroup().addTo(map)
};

// =============================
// UTILITÁRIOS
// =============================
function formatarTimestamp(timestamp) {
    if (!timestamp) return 'N/A';
    const data = new Date(timestamp);
    return data.toLocaleString('pt-BR');
}

// 🔒 Previne XSS em conteúdo dinâmico
function escapeHTML(str) {
    return str?.replace(/[&<>"']/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[m])) || '';
}

// =============================
// CARREGAR FOTOS (PRODUÇÃO)
// =============================
async function carregarFotos() {
    try {
        const response = await fetch('/api/mapa/fotos');

        if (!response.ok) throw new Error("Erro ao buscar fotos");

        const fotos = await response.json();
        layers.fotos.clearLayers();

        // Coleta coordenadas válidas para centralização
        const coordenadasValidas = [];

        fotos.forEach(foto => {
            if (!foto.lat || !foto.lng) return;

            coordenadasValidas.push([foto.lat, foto.lng]);

            const marker = L.marker([foto.lat, foto.lng]).addTo(layers.fotos);

            const popup = `
                <div style="width:200px">
                    <img src="${foto.img}"
                         onerror="this.src='/static/img/placeholder.png'; this.onerror=null;"
                         style="width:100%; border-radius:8px;"
                         alt="Foto de auditoria" />
                    <p><strong>${escapeHTML(foto.descricao) || 'Sem descrição'}</strong></p>
                    <p>${formatarTimestamp(foto.data)}</p>
                    <p>Turno: ${foto.turno_id}</p>
                </div>
            `;

            marker.bindPopup(popup);
        });

        // Atualiza contador
        const statsDiv = document.getElementById("stats-fotos");
        if (statsDiv) {
            statsDiv.innerHTML = `Fotos no mapa: <strong>${fotos.length}</strong>`;
        }

        // 🎯 Centralização dinâmica (UX)
        if (coordenadasValidas.length > 0) {
            const bounds = L.latLngBounds(coordenadasValidas);
            map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
        } else {
            // Fallback caso não haja fotos
            map.setView([-15.5668, -56.0568], 13);
        }

    } catch (err) {
        console.error("Erro ao carregar fotos:", err);
        // Fallback em caso de erro
        map.setView([-15.5668, -56.0568], 13);
    }
}

// =============================
// CONTROLES DE CAMADAS
// =============================
function inicializarToggles() {
    const toggleFotos = document.getElementById("toggle-fotos");
    const toggleAreas = document.getElementById("toggle-areas");

    if (toggleFotos) {
        toggleFotos.addEventListener("change", (e) => {
            e.target.checked ? map.addLayer(layers.fotos) : map.removeLayer(layers.fotos);
        });
    }

    if (toggleAreas) {
        toggleAreas.addEventListener("change", function() {
            this.checked ? map.addLayer(layers.areas) : map.removeLayer(layers.areas);
        });
    }
}

// =============================
// DRAW CONTROLS (ÁREAS)
// =============================
function inicializarDrawControl() {
    const drawControl = new L.Control.Draw({
        draw: {
            polygon: {
                allowIntersection: false,
                shapeOptions: { color: "#0d6efd" }
            },
            rectangle: true,
            circle: false,
            marker: false,
            polyline: false,
            circlemarker: false
        },
        edit: { featureGroup: layers.areas }
    });

    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function(event) {
        const layer = event.layer;
        layers.areas.addLayer(layer);
        console.log("Nova área criada:", layer.toGeoJSON());
    });
}

// =============================
// INICIALIZAÇÃO
// =============================
document.addEventListener("DOMContentLoaded", function() {
    inicializarToggles();
    inicializarDrawControl();
    carregarFotos();

    console.log("🗺️ Mapa de Auditoria inicializado");
});

window.recarregarFotos = carregarFotos;
</script>
{% endblock %}
