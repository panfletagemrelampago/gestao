{% extends "base.html" %}
{% block title %}Mapa de Auditoria — Gestão Promocional{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
#map{
height:70vh;
width:100%;
border-radius:12px;
box-shadow:var(--shadow-md);
z-index:1;
}

.leaflet-popup-content img{
max-width:220px;
border-radius:6px;
margin-top:6px;
display:block;
}

#painel-controle{
position:absolute;
top:80px;
right:10px;
z-index:1000;
width:270px;
background:white;
border-radius:12px;
box-shadow:var(--shadow-md);
padding:14px;
font-size:13px;
max-height:calc(70vh - 20px);
overflow-y:auto;
}

.layer-toggle{
cursor:pointer;
user-select:none;
}

.layer-toggle input{
margin-right:6px;
}

.cor-legenda{
display:inline-block;
width:14px;
height:14px;
border-radius:50%;
margin-right:5px;
vertical-align:middle;
}
</style>
{% endblock %}

{% block content %}
<div class="position-relative">
<div id="map"></div>

<div id="painel-controle">

<div class="fw-bold mb-2" style="color:#8E0000;">
<i class="fas fa-layer-group me-1"></i>
Camadas
</div>

<label class="layer-toggle d-block mb-1">
<input type="checkbox" id="toggle-rastros" checked>
<span class="cor-legenda" style="background:#8E0000;"></span>
Usuários Online (GPS)
</label>

<label class="layer-toggle d-block mb-1">
<input type="checkbox" id="toggle-fotos" checked>
<span class="cor-legenda" style="background:#FF9E0C;"></span>
Fotos de Campo
</label>

<label class="layer-toggle d-block mb-1">
<input type="checkbox" id="toggle-areas" checked>
<span class="cor-legenda" style="background:#0d6efd;border-radius:2px;"></span>
Áreas de Atuação
</label>

<hr class="my-2">

<div id="stats-rastros" class="small">
Usuários Ativos: <strong>0</strong>
</div>

<div id="stats-ultima-atualizacao" class="small text-muted mt-1">
—
</div>

</div>
</div>
{% endblock %}

{% block scripts %}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>

const map = L.map("map").setView([-15.5668,-56.0568],13)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(map)

const drawnItems = new L.FeatureGroup().addTo(map)

const layers={
rastros:L.layerGroup().addTo(map),
fotos:L.layerGroup().addTo(map),
areas:drawnItems,
desenho:drawnItems,
historico:L.layerGroup().addTo(map)
}

// =============================
// DISTÂNCIA (Haversine)
// =============================
function distancia(lat1, lon1, lat2, lon2){
const R = 6371000
const dLat = (lat2-lat1)*Math.PI/180
const dLon = (lon2-lon1)*Math.PI/180

const a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)*Math.sin(dLon/2)

return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))
}

// =============================
// RASTRO PROFISSIONAL
// =============================
function desenharRastro(pontos){

let filtrados=[]
let ultimo=null

pontos.forEach(p=>{

const lat = p.latitude || p.lat
const lng = p.longitude || p.lon || p.lng
const acc = p.accuracy || 0

// ignora gps ruim
if(acc > 50) return

if(ultimo){
const dist = distancia(ultimo.lat, ultimo.lng, lat, lng)

// ignora salto absurdo
if(dist > 120) return
}

filtrados.push([lat,lng])
ultimo = {lat,lng}
})

if(filtrados.length < 2) return

const linha = L.polyline(filtrados,{
color:'#8E0000',
weight:5,
opacity:0.85,
lineJoin:'round'
})

linha.addTo(layers.historico)
map.fitBounds(linha.getBounds())
}

// =============================
// ÁREAS
// =============================
function carregarAreasSalvas(){
fetch("/api/mapa/areas")
.then(r=>r.json())
.then(data=>{
layers.areas.clearLayers()

data.forEach(area=>{
const geojsonLayer=L.geoJSON(area.geojson,{
style:{
color:"#0d6efd",
weight:3,
opacity:0.8,
fillOpacity:0.3
}
})

geojsonLayer.eachLayer(function(layer){
layer.options.areaId = area.id
layer.bindPopup(`<b>${area.nome}</b>`)
layers.areas.addLayer(layer)
})
})
})
}

// =============================
// GPS ONLINE
// =============================
function carregarDadosGPS(){

fetch("/api/gps/latest")
.then(r=>r.json())
.then(data=>{

layers.rastros.clearLayers()
let online=0

data.forEach(pos=>{

if(!pos.latitude || !pos.longitude) return

online++

const marker=L.circleMarker(
[pos.latitude,pos.longitude],
{
radius:8,
fillColor:"#8E0000",
color:"#fff",
weight:2,
fillOpacity:1
}
)

marker.addTo(layers.rastros)

marker.bindPopup(`
<strong>${pos.user_nome}</strong><br>
Precisão: ${pos.accuracy || '--'}<br>
<button onclick="verHistorico(${pos.user_id})">
Ver Rastro
</button>
`)
})

document.getElementById("stats-rastros").innerHTML =
"Usuários Ativos: <strong>"+online+"</strong>"

document.getElementById("stats-ultima-atualizacao").textContent =
"Atualizado agora"
})
}

// =============================
// HISTÓRICO (CORRIGIDO)
// =============================
function verHistorico(userId){

fetch(`/api/gps/historico/${userId}`)
.then(r=>r.json())
.then(data=>{

layers.historico.clearLayers()

let pontos=[]

if(Array.isArray(data)){
pontos=data
}else if(data.pontos){
pontos=data.pontos
}

desenharRastro(pontos)
})
}

// =============================
// TOGGLES
// =============================
document.getElementById("toggle-rastros").addEventListener("change",function(){
this.checked ? map.addLayer(layers.rastros) : map.removeLayer(layers.rastros)
})

document.getElementById("toggle-fotos").addEventListener("change",function(){
this.checked ? map.addLayer(layers.fotos) : map.removeLayer(layers.fotos)
})

document.getElementById("toggle-areas").addEventListener("change",function(){
this.checked ? map.addLayer(layers.areas) : map.removeLayer(layers.areas)
})

// =============================
// DRAW
// =============================
const drawControl=new L.Control.Draw({
draw:{
polygon:{allowIntersection:false,shapeOptions:{color:"#0d6efd"}},
rectangle:true,
circle:false,
marker:false,
polyline:false,
circlemarker:false
},
edit:{featureGroup:layers.desenho}
})

map.addControl(drawControl)

// =============================
carregarAreasSalvas()
carregarDadosGPS()
setInterval(carregarDadosGPS,10000)

</script>

<script src="{{ url_for('static', filename='js/gps_tracker.js') }}"></script>

<script>
document.addEventListener("DOMContentLoaded",function(){
if(typeof iniciarGPS==="function"){
iniciarGPS()
}
})
</script>

{% endblock %}
