{% extends "base.html" %}

{% block title %}Login - Gestão Promocional{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card p-4 mt-5 shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-user-circle fa-4x text-vinho-escuro" style="color: var(--vinho-escuro);"></i>
                <h2 class="mt-3">Acesso ao Sistema</h2>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="seu@email.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="********">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Lembrar de mim</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
