{% extends "base.html" %}
{% block title %}Mapa de Auditoria — Gestão Promocional{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>
#map{
    height:75vh;
    width:100%;
    border-radius:15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    z-index:1;
}

.leaflet-popup-content img{
    max-width:220px;
    border-radius:8px;
    margin-top:8px;
    display:block;
}

/* ── PAINEL RETRÁTIL DE FILTROS ── */
#painel-filtros{
    position:fixed;
    top:15px;
    right:15px;
    z-index:1000;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    font-size: 13px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 80vh;
    user-select: none;
    touch-action: none; /* Importante para o drag no mobile */
}

/* Estado expandido */
#painel-filtros.expandido {
    width: 280px;
    padding: 0;
}

/* Estado retraído */
#painel-filtros.retraido {
    width: 50px;
    height: 50px;
    padding: 0;
    border-radius: 50%;
}

/* Indicador visual durante o arrasto */
#painel-filtros.arrastando {
    opacity: 0.85;
    box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    z-index: 1001;
}

#painel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 15px;
    background: linear-gradient(135deg, #8E0000 0%, #a00000 100%);
    color: white;
    font-weight: 600;
    flex-shrink: 0;
    cursor: grab;
    border-radius: 15px 15px 0 0;
    min-height: 50px;
}

#painel-header:active {
    cursor: grabbing;
}

#painel-filtros.retraido #painel-header {
    border-radius: 50%;
    padding: 0;
    width: 50px;
    height: 50px;
    justify-content: center;
}

#btn-toggle-painel {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

#btn-toggle-painel:hover {
    background: rgba(255,255,255,0.2);
}

#painel-filtros.retraido #btn-toggle-painel {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: none;
}

#painel-titulo {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
}

#drag-handle {
    display: flex;
    align-items: center;
    opacity: 0.6;
    margin-right: 4px;
    font-size: 14px;
}

#painel-filtros.retraido #painel-titulo {
    display: none;
}

#painel-conteudo {
    padding: 15px;
    overflow-y: auto;
    flex: 1;
}

#painel-filtros.retraido #painel-conteudo {
    display: none;
}

.layer-toggle{
    cursor:pointer;
    user-select:none;
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    transition: background 0.2s;
}

.layer-toggle:hover {
    background: rgba(0,0,0,0.05);
}

.layer-toggle input{
    margin-right:10px;
    cursor: pointer;
    width: 18px;
    height: 18px;
}

.cor-legenda{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:3px;
    margin-right:8px;
    flex-shrink: 0;
}

.divisor-painel {
    height: 1px;
    background: rgba(0,0,0,0.08);
    margin: 10px 0;
}

.stats-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
}

/* Toast de notificação */
#toast-mapa {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    min-width: 280px;
    display: none;
}

/* Marcador com badge de contagem */
.marker-cluster {
    background-clip: padding-box;
    border-radius: 40px;
}

.marker-cluster div {
    width: 30px;
    margin-left: 5px;
    margin-top: 5px;
    text-align: center;
    border-radius: 15px;
    font: 12px "Helvetica Neue", Arial, Helvetica, sans-serif;
}

.marker-cluster .marker-cluster-small {
    background-color: rgba(255, 158, 12, 0.6);
}

.marker-cluster .marker-cluster-medium {
    background-color: rgba(255, 158, 12, 0.8);
}

.marker-cluster .marker-cluster-large {
    background-color: rgba(255, 158, 12, 1);
}

/* Responsivo Mobile */
@media (max-width: 768px) {
    #painel-filtros.expandido {
        width: 240px;
        border-radius: 15px;
    }
    
    #painel-header {
        padding: 10px 12px;
        min-height: 45px;
    }

    #painel-filtros.retraido {
        width: 50px;
        height: 50px;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="position-relative">
    <div id="map"></div>

    <!-- PAINEL DE FILTROS RETRÁTIL -->
    <div id="painel-filtros" class="expandido">
        <div id="painel-header">
            <div id="painel-titulo">
                <span id="drag-handle" title="Arraste para mover">
                    <i class="fas fa-grip-vertical"></i>
                </span>
                <i class="fas fa-layer-group me-1"></i>
                <span>Camadas</span>
            </div>
            <button id="btn-toggle-painel" type="button" title="Alternar painel">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div id="painel-conteudo">
            <label class="layer-toggle">
                <input type="checkbox" id="toggle-fotos" checked>
                <span class="cor-legenda" style="background:#FF9E0C; border-radius: 50%;"></span>
                <span>Fotos de Campo</span>
            </label>

            <label class="layer-toggle">
                <input type="checkbox" id="toggle-areas" checked>
                <span class="cor-legenda" style="background:#0d6efd;"></span>
                <span>Áreas de Atuação</span>
            </label>

            <div class="divisor-painel"></div>

            <div class="stats-item">
                <span><i class="fas fa-camera me-1"></i>Fotos:</span>
                <strong id="stats-fotos-count">0</strong>
            </div>
            <div class="stats-item">
                <span><i class="fas fa-draw-polygon me-1"></i>Áreas:</span>
                <strong id="count-areas">0</strong>
            </div>
        </div>
    </div>
</div>

<!-- Toast de notificação -->
<div id="toast-mapa" class="alert shadow-lg border-0 rounded-3 text-center fw-semibold"></div>

{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.0/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.Default.css" />

<script>
// =============================
// PAINEL RETRÁTIL E DRAG
// =============================
(function() {
    const painel = document.getElementById('painel-filtros');
    const header = document.getElementById('painel-header');
    const btnToggle = document.getElementById('btn-toggle-painel');

    let isDragging = false;
    let startX, startY, startLeft, startTop;
    let hasMoved = false;
    const STORAGE_KEY = 'painel_filtros_pos';

    // Alternar expandir/retrair
    btnToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const isRetraido = painel.classList.contains('retraido');
        
        if (isRetraido) {
            painel.classList.remove('retraido');
            painel.classList.add('expandido');
        } else {
            painel.classList.remove('expandido');
            painel.classList.add('retraido');
        }
        
        // Reajustar posição após mudar tamanho
        const rect = painel.getBoundingClientRect();
        aplicarPosicao(rect.left, rect.top);
    });

    function aplicarPosicao(left, top) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const pw = painel.offsetWidth;
        const ph = painel.offsetHeight;

        left = Math.max(5, Math.min(left, vw - pw - 5));
        top  = Math.max(5, Math.min(top,  vh - ph - 5));

        painel.style.right = 'auto';
        painel.style.left  = left + 'px';
        painel.style.top   = top  + 'px';
    }

    function salvarPosicao(left, top) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ left, top }));
    }

    function restaurarPosicao() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const pos = JSON.parse(saved);
                aplicarPosicao(pos.left, pos.top);
            }
        } catch (e) {}
    }

    // Lógica de Drag (Mouse e Touch)
    function onStart(e) {
        if (e.target.closest('button')) return;
        
        isDragging = true;
        hasMoved = false;
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        
        const rect = painel.getBoundingClientRect();
        startX = clientX;
        startY = clientY;
        startLeft = rect.left;
        startTop  = rect.top;
        
        painel.classList.add('arrastando');
    }

    function onMove(e) {
        if (!isDragging) return;
        
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        
        const dx = clientX - startX;
        const dy = clientY - startY;
        
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            hasMoved = true;
            if (e.cancelable) e.preventDefault();
        }
        
        aplicarPosicao(startLeft + dx, startTop + dy);
    }

    function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        painel.classList.remove('arrastando');
        if (hasMoved) {
            const rect = painel.getBoundingClientRect();
            salvarPosicao(rect.left, rect.top);
        }
    }

    header.addEventListener('mousedown', onStart);
    header.addEventListener('touchstart', onStart, { passive: true });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);

    window.addEventListener('load', restaurarPosicao);
    window.addEventListener('resize', () => {
        const rect = painel.getBoundingClientRect();
        aplicarPosicao(rect.left, rect.top);
    });
})();

// =============================
// CONFIGURAÇÃO GLOBAL DO MAPA
// =============================
const map = L.map("map").setView([-15.5668, -56.0568], 13);

const layers = {
    base: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map),
    fotos: L.markerClusterGroup({
        maxClusterRadius: 50,
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            let className = 'marker-cluster-small';
            if (count > 10) className = 'marker-cluster-large';
            else if (count > 5) className = 'marker-cluster-medium';
            
            return L.divIcon({
                html: `<div class="${className}"><span>${count}</span></div>`,
                className: 'marker-cluster',
                iconSize: L.point(40, 40)
            });
        }
    }).addTo(map),
    areas: L.featureGroup().addTo(map)
};

const areaLayerMap = {};

function escapeHTML(str) {
    return str?.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m])) || '';
}

function mostrarToast(mensagem, tipo = 'success') {
    const toast = document.getElementById('toast-mapa');
    toast.className = `alert alert-${tipo} shadow-lg border-0 rounded-3 text-center fw-semibold`;
    toast.textContent = mensagem;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

async function carregarFotos() {
    try {
        const response = await fetch('/api/mapa/fotos');
        const fotos = await response.json();
        layers.fotos.clearLayers();
        const coordenadasValidas = [];

        fotos.forEach(foto => {
            if (!foto.lat || !foto.lng) return;
            coordenadasValidas.push([foto.lat, foto.lng]);
            const marker = L.marker([foto.lat, foto.lng]);
            
            const dataFormatada = foto.data ? new Date(foto.data).toLocaleString('pt-BR') : 'N/A';
            const popup = `
                <div style="width:200px">
                    <img src="${foto.img}" style="width:100%; border-radius:8px;" />
                    <p class="mt-2 mb-1"><strong>${escapeHTML(foto.descricao) || 'Sem descrição'}</strong></p>
                    <p class="mb-1 small text-muted"><i class="far fa-calendar-alt me-1"></i> ${dataFormatada}</p>
                    <p class="mb-0 small text-primary fw-bold"><i class="fas fa-clock me-1"></i> Turno: ${foto.turno_id}</p>
                </div>
            `;
            marker.bindPopup(popup);
            layers.fotos.addLayer(marker);
        });

        document.getElementById("stats-fotos-count").innerText = fotos.length;

        if (coordenadasValidas.length > 0) {
            map.fitBounds(L.latLngBounds(coordenadasValidas), { padding: [50, 50], maxZoom: 16 });
        }
    } catch (err) {
        console.error("Erro ao carregar fotos:", err);
    }
}

async function carregarAreas() {
    try {
        const response = await fetch('/api/mapa/areas');
        const areas = await response.json();
        layers.areas.clearLayers();
        Object.keys(areaLayerMap).forEach(k => delete areaLayerMap[k]);

        let totalAreas = 0;
        areas.forEach(area => {
            if (!area.geojson) return;
            totalAreas++;
            const geoLayer = L.geoJSON(area.geojson, {
                style: { color: area.cor || "#0d6efd", weight: 3, opacity: 0.8, fillOpacity: 0.15 }
            }).addTo(layers.areas);

            if (area.id) areaLayerMap[area.id] = geoLayer;

            const nomeArea = escapeHTML(area.nome) || 'Área sem nome';
            const descArea = escapeHTML(area.descricao) || 'Sem descrição';

            {% if current_user.tipo_usuario in ['admin', 'equipe'] %}
            geoLayer.bindPopup(`
                <div style="min-width:180px">
                    <h6 class="mb-1 fw-bold text-primary">${nomeArea}</h6>
                    <p class="mb-2 small">${descArea}</p>
                    <button onclick="excluirArea(${area.id})" class="btn btn-sm btn-danger w-100 rounded-pill">
                        <i class="fas fa-trash me-1"></i> Excluir Área
                    </button>
                </div>
            `);
            {% else %}
            geoLayer.bindPopup(`
                <div style="min-width:150px">
                    <h6 class="mb-1 fw-bold text-primary">${nomeArea}</h6>
                    <p class="mb-0 small">${descArea}</p>
                </div>
            `);
            {% endif %}
        });
        document.getElementById('count-areas').textContent = totalAreas;
    } catch (err) {
        console.error("Erro ao carregar áreas:", err);
    }
}

async function salvarArea(layer) {
    const geojson = layer.toGeoJSON();
    const nome = prompt('Nome para esta área (opcional):', 'Área ' + new Date().toLocaleDateString('pt-BR'));
    const nomeArea = (nome !== null && nome.trim() !== '') ? nome.trim() : 'Área ' + new Date().toLocaleDateString('pt-BR');

    try {
        mostrarToast('Salvando área...', 'info');
        const response = await fetch('/api/mapa/areas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nome: nomeArea, geojson: geojson })
        });
        const data = await response.json();
        if (response.ok && data.status === 'sucesso') {
            mostrarToast('✅ Área "' + nomeArea + '" salva com sucesso!', 'success');
            await carregarAreas();
        } else {
            mostrarToast('❌ Erro ao salvar área: ' + (data.erro || 'Tente novamente.'), 'danger');
            layers.areas.removeLayer(layer);
        }
    } catch (err) {
        console.error("Erro ao salvar área:", err);
        mostrarToast('❌ Erro de comunicação ao salvar área.', 'danger');
        layers.areas.removeLayer(layer);
    }
}

async function excluirArea(areaId) {
    if (!confirm('Deseja excluir esta área permanentemente?')) return;
    try {
        const response = await fetch('/api/mapa/areas/' + areaId, { method: 'DELETE' });
        const data = await response.json();
        if (response.ok && data.status === 'sucesso') {
            mostrarToast('✅ Área excluída com sucesso!', 'success');
            await carregarAreas();
        } else {
            mostrarToast('❌ Erro ao excluir área: ' + (data.erro || 'Tente novamente.'), 'danger');
        }
    } catch (err) {
        console.error("Erro ao excluir área:", err);
        mostrarToast('❌ Erro de comunicação ao excluir área.', 'danger');
    }
}

function inicializarDrawControl() {
    {% if current_user.tipo_usuario in ['admin', 'equipe'] %}
    const drawControl = new L.Control.Draw({
        draw: {
            polygon: { allowIntersection: false, shapeOptions: { color: "#0d6efd" } },
            rectangle: { shapeOptions: { color: "#0d6efd" } },
            circle: false, marker: false, polyline: false, circlemarker: false
        },
        edit: { featureGroup: layers.areas }
    });
    map.addControl(drawControl);
    map.on(L.Draw.Event.CREATED, (e) => { layers.areas.addLayer(e.layer); salvarArea(e.layer); });
    {% endif %}
}

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("toggle-fotos").addEventListener("change", (e) => {
        e.target.checked ? map.addLayer(layers.fotos) : map.removeLayer(layers.fotos);
    });
    document.getElementById("toggle-areas").addEventListener("change", (e) => {
        e.target.checked ? map.addLayer(layers.areas) : map.removeLayer(layers.areas);
    });
    inicializarDrawControl();
    carregarFotos();
    carregarAreas();
});

window.recarregarMapa = () => { carregarFotos(); carregarAreas(); };
</script>
{% endblock %}
